<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Notes</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h1>Upload Notes</h1>
        <div class="auth-form">
            <select id="semester">
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>
            <select id="subject">
                <option value="coa">COA</option>
                <option value="dbms">DBMS</option>
                <option value="dbmslab">DBMS Lab</option>
                <option value="ethics">Ethics</option>
                <option value="maths">Mathematics</option>
                <option value="os">Operating System</option>
                <option value="oslab">OS Lab</option>
                <option value="se">Software Engineering</option>
            </select>
            <select id="category">
                <option value="notes">Notes</option>
                <option value="syllabus">Syllabus</option>
                <option value="pyq">PYQ</option>
                <option value="textbook">Textbook</option>
                <option value="series_test">Series Test</option>
                <option value="manual">Manual</option>
                <option value="experiments">Experiments</option>
                <option value="experiment_answer_key">Experiment Answer Key</option>
                <option value="questions">Questions</option>
            </select>
            <input type="text" id="module-name" placeholder="Module name (e.g. Module 1)" />
            <input type="text" id="drive-link" placeholder="Paste Google Drive link here" />
            <button onclick="submitLink()">Submit</button>
            <p id="status-msg"></p>
            <p><a href="login.html" onclick="logout()">Logout</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        supabaseClient.auth.getSession().then(({ data }) => {
            if (!data.session) {
                window.location.href = "login.html";
            }
        });

        async function submitLink() {
            const semester = document.getElementById("semester").value;
            const subject = document.getElementById("subject").value;
            const category = document.getElementById("category").value;
            const moduleName = document.getElementById("module-name").value;
            const driveLink = document.getElementById("drive-link").value;
            const status = document.getElementById("status-msg");

            if (!moduleName || !driveLink) {
                status.textContent = "Please fill all fields!";
                status.style.color = "red";
                return;
            }

            if (!driveLink.includes("drive.google.com")) {
                status.textContent = "Please enter a valid Google Drive link!";
                status.style.color = "red";
                return;
            }

            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session.user;

            const { error } = await supabaseClient
                .from("links")
                .insert({
                    module_name: moduleName,
                    drive_link: driveLink,
                    semester: semester,
                    subject: subject,
                    category: category,
                    uploaded_by: user.email,
                    status: "pending"
                });

            if (error) {
                status.textContent = "Error: " + error.message;
                status.style.color = "red";
                return;
            }

            status.textContent = "Submitted! Waiting for admin approval.";
            status.style.color = "green";
            document.getElementById("module-name").value = "";
            document.getElementById("drive-link").value = "";
        }

        async function logout() {
            await supabaseClient.auth.signOut();
        }
    </script>
</body>
</html>

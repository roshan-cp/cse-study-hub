<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semester</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1 id="semester-title">Loading...</h1>
        <div id="subject-grid" class="subject-grid"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const semester = params.get("semester");

        const subjects = {
            4: [
                { name: "COA", id: "coa", type: "theory" },
                { name: "DBMS", id: "dbms", type: "theory" },
                { name: "DBMS Lab", id: "dbmslab", type: "lab" },
                { name: "Ethics", id: "ethics", type: "theory" },
                { name: "Mathematics", id: "maths", type: "theory" },
                { name: "Operating System", id: "os", type: "theory" },
                { name: "OS Lab", id: "oslab", type: "lab" },
                { name: "Software Engineering", id: "se", type: "theory" }
            ]
        };

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");
            
            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        document.getElementById("semester-title").textContent = `Semester ${semester}`;

        const grid = document.getElementById("subject-grid");

        if (subjects[semester]) {
            subjects[semester].forEach(subject => {
                const a = document.createElement("a");
                a.href = `subject.html?semester=${semester}&subject=${subject.id}&type=${subject.type}`;
                a.className = "card";
                a.textContent = subject.name;
                grid.appendChild(a);
            });
        } else {
            grid.innerHTML = `<p class="empty-message">Subjects coming soon...</p>`;
        }

        loadNavbar();
    </script>
</body>
</html>

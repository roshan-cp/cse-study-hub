<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1 id="category-title">Loading...</h1>
        <div id="folder-info"></div>
        <div id="add-link-section"></div>
        <div id="links-list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "roshancp.in@gmail.com";
        const params = new URLSearchParams(window.location.search);
        const semester = params.get("semester");
        const subject = params.get("subject");
        const category = params.get("category");
        const folderName = params.get("folderName");
        const isDefault = params.get("isDefault") === "true";

        const categoryNames = {
            notes: "Notes",
            syllabus: "Syllabus",
            pyq: "PYQ",
            textbook: "Textbook",
            series_test: "Series Test",
            manual: "Manual",
            experiments: "Experiments",
            experiment_answer_key: "Experiment Answer Key",
            questions: "Questions"
        };

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");

            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        document.getElementById("category-title").textContent =
            isDefault ? `📁 ${categoryNames[category]}` : `📁 ${folderName}`;

        async function loadFolderInfo() {
            if (isDefault) return;

            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session?.user;
            const isAdmin = user?.email === ADMIN_EMAIL;

            const { data: folder } = await supabaseClient
                .from("folders")
                .select("*")
                .eq("id", category)
                .single();

            if (!folder) return;

            const folderInfo = document.getElementById("folder-info");
            const canDeleteFolder = isAdmin || (user?.email === folder.created_by);

            folderInfo.innerHTML = `
                <div style="background:#f0f0f0; padding:15px; border-radius:8px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <p style="margin:0;">Created by: <strong>${folder.created_by}</strong></p>
                        <p style="margin:5px 0 0 0; font-size:12px; color:#666;">Folder: ${folder.folder_name}</p>
                    </div>
                    ${canDeleteFolder ? `<button onclick="deleteFolder('${folder.id}')" style="background:#e74c3c; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer;">🗑️ Delete Folder</button>` : ""}
                </div>
            `;
        }

        async function loadLinks() {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session?.user;
            const isAdmin = user?.email === ADMIN_EMAIL;

            // Add Link button — login required
            const addLinkSection = document.getElementById("add-link-section");
            addLinkSection.innerHTML = "";

            const addBtn = document.createElement("button");
            addBtn.className = "add-link-btn";
            addBtn.textContent = "➕ Add Link";
            addBtn.onclick = function () {
                if (!user) {
                    window.location.href = "login.html";
                    return;
                }
                addLink(user.email);
            };
            addLinkSection.appendChild(addBtn);

            // Load approved links
            const linksList = document.getElementById("links-list");
            linksList.innerHTML = `<p style="color: blue;">⏳ Loading content...</p>`;

            await new Promise(resolve => setTimeout(resolve, 300));

            const { data, error } = await supabaseClient
                .from("links")
                .select("*")
                .eq("semester", semester)
                .eq("subject", subject)
                .eq("category", category)
                .eq("status", "approved")
                .order("created_at", { ascending: true });

            linksList.innerHTML = "";

            if (error) {
                linksList.innerHTML = `<p class="empty-message">Error loading links.</p>`;
                return;
            }

            if (!data || data.length === 0) {
                linksList.innerHTML = `<p class="empty-message">No content available yet.</p>`;
                return;
            }

            data.forEach(link => {
                const div = document.createElement("div");
                div.className = "note-item";
                const canDelete = isAdmin || (user?.email === link.uploaded_by);
                div.innerHTML = `
                    <a href="${link.drive_link}" target="_blank" style="flex:1; display:block;">📄 ${link.module_name}</a>
                    ${canDelete && user ? `<button class="delete-btn" onclick="deleteLink('${link.id}')">🗑️</button>` : ""}
                `;
                linksList.appendChild(div);
            });
        }

        async function addLink(userEmail) {
            const moduleName = prompt("Link title (e.g. Unit 1 Notes):");
            if (!moduleName || moduleName.trim() === "") return;

            const driveLink = prompt("Paste the Google Drive / link URL:");
            if (!driveLink || driveLink.trim() === "") return;

            const { error } = await supabaseClient
                .from("links")
                .insert({
                    module_name: moduleName.trim(),
                    drive_link: driveLink.trim(),
                    semester: semester,
                    subject: subject,
                    category: category,
                    uploaded_by: userEmail,
                    status: "pending"
                });

            if (error) {
                alert("Error submitting link: " + error.message);
                return;
            }

            alert("Link submitted! It will appear after admin approval.");
            loadLinks();
        }

        async function deleteLink(id) {
            if (!confirm("Delete this link?")) return;
            await supabaseClient.from("links").delete().eq("id", id);
            loadLinks();
        }

        async function deleteFolder(id) {
            if (!confirm("Delete this folder and all its links?")) return;
            await supabaseClient.from("folders").delete().eq("id", id);
            await supabaseClient.from("links").delete().eq("category", id);
            window.location.href = `subject.html?semester=${semester}&subject=${subject}&type=theory`;
        }

        loadNavbar();
        loadFolderInfo();
        loadLinks();
    </script>
</body>
</html>

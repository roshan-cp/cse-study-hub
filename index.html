<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1>CSE Study Hub</h1>
        <div class="subject-grid">
            <a href="pages/year.html?year=1" class="card">First Year</a>
            <a href="pages/year.html?year=2" class="card">Second Year</a>
            <a href="pages/year.html?year=3" class="card">Third Year</a>
            <a href="pages/year.html?year=4" class="card">Fourth Year</a>
            <div id="pending-card-container"></div>
        </div>
    </div>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    const ADMIN_EMAIL = "roshancp.in@gmail.com";

    async function loadNavbar() {
        const { data } = await supabaseClient.auth.getSession();
        const user = data.session?.user;
        const navbar = document.getElementById("navbar");
        
        if (user) {
            navbar.innerHTML = `
                <div class="nav-left">
                    <a href="index.html" class="nav-brand">CSE Study Hub</a>
                    <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                </div>
                <button onclick="logout()" class="logout-btn">Logout</button>
            `;
        } else {
            navbar.innerHTML = `
                <a href="index.html" class="nav-brand">CSE Study Hub</a>
                <a href="pages/login.html" class="nav-login">Login</a>
            `;
        }
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    async function loadPendingCard() {
        const { data } = await supabaseClient.auth.getSession();
        const user = data.session?.user;
        const isAdmin = user && user.email === ADMIN_EMAIL;

        const container = document.getElementById("pending-card-container");

        if (!isAdmin) {
            container.innerHTML = "";
            return;
        }

        // Get count of pending links (retried automatically on flaky connections)
        const { data: pendingLinks, error } = await withRetry(() =>
            supabaseClient
                .from("links")
                .select("id")
                .eq("status", "pending")
        );

        const statusHtml = error
            ? `⚠️ Couldn't load count`
            : `🔴 ${pendingLinks ? pendingLinks.length : 0} pending`;

        container.innerHTML = `
            <div class="card pending-requests-card" onclick="goToPending()">
                📋 Pending Requests
                <div style="font-size:14px; color:#e74c3c; margin-top:5px;">${statusHtml}</div>
            </div>
        `;
    }

    function goToPending() {
        window.location.href = "pages/pending.html";
    }

    // Wait for Supabase to initialize
    setTimeout(() => {
        loadNavbar();
        loadPendingCard();
    }, 500);

    // Refresh pending card every 5 seconds
    setInterval(loadPendingCard, 5000);
</script>
</body>
</html>

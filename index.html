<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1>CSE Study Hub</h1>
        <div class="subject-grid">
            <a href="pages/year.html?year=1" class="card">First Year</a>
            <a href="pages/year.html?year=2" class="card">Second Year</a>
            <a href="pages/year.html?year=3" class="card">Third Year</a>
            <a href="pages/year.html?year=4" class="card">Fourth Year</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");
            if (user) {
                navbar.innerHTML = `
                    <a href="index.html" class="nav-brand">CSE Study Hub</a>
                    <div class="nav-right">
                        <span>Hi, ${user.email.split("@")[0]}</span>
                        <button onclick="logout()">Logout</button>
                    </div>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="index.html" class="nav-brand">CSE Study Hub</a>
                    <div class="nav-right">
                        <a href="pages/login.html" class="nav-login">Login</a>
                    </div>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        loadNavbar();
    </script>
</body>
</html>

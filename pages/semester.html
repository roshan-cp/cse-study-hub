<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semester</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1 id="semester-title">Loading...</h1>
        <div id="subject-grid" class="subject-grid"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "roshancp.in@gmail.com";
        const params = new URLSearchParams(window.location.search);
        const semester = params.get("semester");

        const defaultSubjects = {
            4: [
                { name: "COA", id: "coa", type: "theory" },
                { name: "DBMS", id: "dbms", type: "theory" },
                { name: "DBMS Lab", id: "dbmslab", type: "lab" },
                { name: "Ethics", id: "ethics", type: "theory" },
                { name: "Mathematics", id: "maths", type: "theory" },
                { name: "Operating System", id: "os", type: "theory" },
                { name: "OS Lab", id: "oslab", type: "lab" },
                { name: "Software Engineering", id: "se", type: "theory" }
            ]
        };

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");

            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        document.getElementById("semester-title").textContent = `Semester ${semester}`;

        async function loadSubjects() {
            const grid = document.getElementById("subject-grid");
            grid.innerHTML = "";

            // Hardcoded defaults
            const defaults = defaultSubjects[semester] || [];
            defaults.forEach(subject => {
                const a = document.createElement("a");
                a.href = `subject.html?semester=${semester}&subject=${subject.id}&type=${subject.type}`;
                a.className = "card";
                a.textContent = subject.name;
                grid.appendChild(a);
            });

            // Custom subjects from Supabase
            const { data: customSubjects } = await supabaseClient
                .from("subjects")
                .select("*")
                .eq("semester", semester)
                .order("created_at", { ascending: true });

            if (customSubjects && customSubjects.length > 0) {
                customSubjects.forEach(subject => {
                    const a = document.createElement("a");
                    a.href = `subject.html?semester=${semester}&subject=${subject.subject_id}&type=${subject.type}`;
                    a.className = "card";
                    a.textContent = subject.name;
                    grid.appendChild(a);
                });
            }
        }

       async function addSubject() {
    const name = prompt("Subject name:");
    if (!name || name.trim() === "") return;

    const { data: sessionData } = await supabaseClient.auth.getSession();
    const user = sessionData.session?.user;

    // Generate subject ID automatically
    let id = name
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, "");

    const { error } = await supabaseClient
        .from("subjects")
        .insert({
            name: name.trim(),
            subject_id: id,
            type: "theory",
            semester: semester,
            created_by: user?.email || "anonymous"
        });

    if (error) {
        alert("Error adding subject: " + error.message);
        return;
    }

    alert("Subject added!");
    loadSubjects();
}
        

        loadNavbar();
        loadSubjects();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <div id="links-list"><p>Loading pending links...</p></div>
        <p><a href="login.html" onclick="logout()">Logout</a></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "roshancp.in@gmail.com";

        supabaseClient.auth.getSession().then(({ data }) => {
            if (!data.session || data.session.user.email !== ADMIN_EMAIL) {
                window.location.href = "login.html";
                return;
            }
            loadPendingLinks();
        });

        async function loadPendingLinks() {
            const { data, error } = await supabaseClient
                .from("links")
                .select("*")
                .eq("status", "pending")
                .order("created_at", { ascending: false });

            const list = document.getElementById("links-list");

            if (error || !data || data.length === 0) {
                list.innerHTML = "<p>No pending links.</p>";
                return;
            }

            list.innerHTML = "";
            data.forEach(link => {
                const div = document.createElement("div");
                div.className = "note-item";
                div.innerHTML = `
                    <p><b>${link.module_name}</b></p>
                    <p>Semester ${link.semester} → ${link.subject} → ${link.category}</p>
                    <p>Uploaded by: ${link.uploaded_by}</p>
                    <a href="${link.drive_link}" target="_blank">👁 Preview</a>
                    <button onclick="approve('${link.id}')">✅ Accept</button>
                    <button onclick="reject('${link.id}')">❌ Reject</button>
                    <hr/>
                `;
                list.appendChild(div);
            });
        }

        async function approve(id) {
            const { error } = await supabaseClient
                .from("links")
                .update({ status: "approved" })
                .eq("id", id);

            if (error) {
                alert("Error: " + error.message);
                return;
            }
            alert("Link approved!");
            loadPendingLinks();
        }

        async function reject(id) {
            const { error } = await supabaseClient
                .from("links")
                .delete()
                .eq("id", id);

            if (error) {
                alert("Error: " + error.message);
                return;
            }
            alert("Link rejected!");
            loadPendingLinks();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
        }
    </script>
</body>
</html>

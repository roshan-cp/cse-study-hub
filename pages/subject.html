<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1 id="subject-title">Loading...</h1>
        <div id="folders-grid" class="subject-grid"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "YOUR_ADMIN_EMAIL@gmail.com";
        const params = new URLSearchParams(window.location.search);
        const semester = params.get("semester");
        const subject = params.get("subject");
        const type = params.get("type");

        const subjectNames = {
            coa: "Computer Organization and Architecture",
            dbms: "Database Management System",
            dbmslab: "DBMS Lab",
            ethics: "Professional Ethics",
            maths: "Mathematics",
            os: "Operating System",
            oslab: "OS Lab",
            se: "Software Engineering"
        };

        const theoryFolders = [
            { name: "📁 Notes", category: "notes" },
            { name: "📁 Syllabus", category: "syllabus" },
            { name: "📁 PYQ", category: "pyq" },
            { name: "📁 Textbook", category: "textbook" },
            { name: "📁 Series Test", category: "series_test" }
        ];

        const labFolders = [
            { name: "📁 Manual", category: "manual" },
            { name: "📁 Experiments", category: "experiments" },
            { name: "📁 Experiment Answer Key", category: "experiment_answer_key" },
            { name: "📁 Questions", category: "questions" }
        ];

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");
            
            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        document.getElementById("subject-title").textContent = `${subjectNames[subject]} (Semester ${semester})`;

        async function loadFolders() {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session?.user;
            const isLoggedIn = !!user;

            const grid = document.getElementById("folders-grid");
            grid.innerHTML = "";

            // Add Folder button - only for logged in users
            if (isLoggedIn) {
                const addBtn = document.createElement("div");
                addBtn.className = "card add-folder-card";
                addBtn.style.cursor = "pointer";
                addBtn.innerHTML = `➕ Add Folder`;
                addBtn.onclick = function() { addFolder(user.email); };
                grid.appendChild(addBtn);
            }

            // Default folders - visible to everyone
            const defaultFolders = type === "lab" ? labFolders : theoryFolders;
            defaultFolders.forEach(folder => {
                const a = document.createElement("a");
                a.href = `category.html?semester=${semester}&subject=${subject}&category=${folder.category}&isDefault=true`;
                a.className = "card";
                a.textContent = folder.name;
                grid.appendChild(a);
            });

            // Student created folders - visible to everyone, NO delete button here
            const { data: customFolders } = await supabaseClient
                .from("folders")
                .select("*")
                .eq("semester", semester)
                .eq("subject", subject)
                .order("created_at", { ascending: true });

            if (customFolders && customFolders.length > 0) {
                customFolders.forEach(folder => {
                    const a = document.createElement("a");
                    a.href = `category.html?semester=${semester}&subject=${subject}&category=${folder.id}&folderName=${folder.folder_name}&isDefault=false`;
                    a.className = "card";
                    a.textContent = `📁 ${folder.folder_name}`;
                    grid.appendChild(a);
                });
            }
        }

        async function addFolder(userEmail) {
            const name = prompt("Enter folder name:");
            if (!name || name.trim() === "") {
                alert("Folder name cannot be empty!");
                return;
            }

            const { error } = await supabaseClient
                .from("folders")
                .insert({
                    folder_name: name.trim(),
                    semester: semester,
                    subject: subject,
                    created_by: userEmail
                });

            if (error) {
                alert("Error creating folder: " + error.message);
                return;
            }

            alert("Folder created successfully!");
            loadFolders();
        }

        loadNavbar();
        loadFolders();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1 id="category-title">Loading...</h1>
        <div id="links-list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="../navbar.js"></script>
    <script>
        const ADMIN_EMAIL = "YOUR_ADMIN_EMAIL@gmail.com";
        const params = new URLSearchParams(window.location.search);
        const semester = params.get("semester");
        const subject = params.get("subject");
        const type = params.get("type");
        const category = params.get("category");
        const folderName = params.get("folderName");
        const isDefault = params.get("isDefault") === "true";

        const categoryNames = {
            notes: "Notes",
            syllabus: "Syllabus",
            pyq: "PYQ",
            textbook: "Textbook",
            series_test: "Series Test",
            manual: "Manual",
            experiments: "Experiments",
            experiment_answer_key: "Experiment Answer Key",
            questions: "Questions"
        };

        const titleEl = document.getElementById("category-title");
        titleEl.textContent = isDefault ? `📁 ${categoryNames[category]}` : `📁 ${folderName}`;

        async function loadLinks() {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session?.user;
            const isAdmin = user?.email === ADMIN_EMAIL;
            const isLoggedIn = !!user;

            const linksList = document.getElementById("links-list");
            linksList.innerHTML = "";

            // Folder delete button (custom folders only)
            if (!isDefault) {
                const { data: folder } = await supabaseClient
                    .from("folders")
                    .select("*")
                    .eq("id", category)
                    .single();

                const canDeleteFolder = folder && (isAdmin || user?.email === folder.created_by);
                if (canDeleteFolder) {
                    const delBtn = document.createElement("button");
                    delBtn.className = "delete-btn";
                    delBtn.textContent = "🗑️ Delete Folder";
                    delBtn.onclick = () => deleteFolder(category);
                    titleEl.appendChild(delBtn);
                }
            }

            // Add Link button - visible to everyone, login required to use
            const addBtn = document.createElement("button");
            addBtn.className = "add-link-btn";
            addBtn.textContent = "➕ Add Link";
            addBtn.onclick = () => {
                if (!isLoggedIn) {
                    sessionStorage.setItem("redirectAfterLogin", window.location.href);
                    sessionStorage.setItem("resumeAction", "addLink");
                    window.location.href = "login.html";
                    return;
                }
                addLink(user.email);
            };
            linksList.appendChild(addBtn);

            const { data, error } = await supabaseClient
                .from("links")
                .select("*")
                .eq("semester", semester)
                .eq("subject", subject)
                .eq("category", category)
                .eq("status", "approved")
                .order("created_at", { ascending: true });

            if (error) {
                const p = document.createElement("p");
                p.className = "empty-message";
                p.textContent = "Error loading links.";
                linksList.appendChild(p);
                return;
            }

            if (!data || data.length === 0) {
                const p = document.createElement("p");
                p.className = "empty-message";
                p.textContent = "No content available yet.";
                linksList.appendChild(p);
            } else {
                data.forEach(link => {
                    const div = document.createElement("div");
                    div.className = "note-item";
                    const canDelete = isAdmin || (user?.email === link.uploaded_by);
                    div.innerHTML = `
                        <a href="${link.drive_link}" target="_blank">📄 ${link.module_name}</a>
                        ${canDelete ? `<button class="delete-btn" onclick="deleteLink('${link.id}')">🗑️</button>` : ""}
                    `;
                    linksList.appendChild(div);
                });
            }

            // Resume "Add Link" after returning from login
            if (isLoggedIn && sessionStorage.getItem("resumeAction") === "addLink") {
                sessionStorage.removeItem("resumeAction");
                addLink(user.email);
            }
        }

        async function addLink(userEmail) {
            const moduleName = prompt("Enter module name (e.g. Module 1):");
            if (!moduleName) return;

            const driveLink = prompt("Paste Google Drive link:");
            if (!driveLink) return;

            if (!driveLink.includes("drive.google.com")) {
                alert("Please enter a valid Google Drive link!");
                return;
            }

            const { error } = await supabaseClient
                .from("links")
                .insert({
                    module_name: moduleName,
                    drive_link: driveLink,
                    semester: semester,
                    subject: subject,
                    category: category,
                    uploaded_by: userEmail,
                    status: "pending"
                });

            if (error) {
                alert("Error: " + error.message);
                return;
            }

            alert("Link submitted! Waiting for admin approval.");
        }

        async function deleteLink(id) {
            if (!confirm("Delete this link?")) return;
            await supabaseClient.from("links").delete().eq("id", id);
            loadLinks();
        }

        async function deleteFolder(id) {
            if (!confirm("Delete this folder and all its links?")) return;
            await supabaseClient.from("links").delete().eq("category", id);
            await supabaseClient.from("folders").delete().eq("id", id);
            window.location.href = `subject.html?semester=${semester}&subject=${subject}&type=${type}`;
        }

        loadLinks();
    </script>
</body>
</html>

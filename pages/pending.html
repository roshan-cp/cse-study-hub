<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Requests</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1>Pending Requests</h1>
        
        <h2>📋 Pending Requests by Folder</h2>
        <div id="pending-folders" class="subject-grid"></div>

        <h2 style="margin-top: 30px;">⏳ Pending Links to Approve</h2>
        <div id="links-list"><p>Loading...</p></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "roshancp.in@gmail.com";

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");
            
            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        supabaseClient.auth.getSession().then(({ data }) => {
            if (!data.session || data.session.user.email !== ADMIN_EMAIL) {
                window.location.href = "../index.html";
                return;
            }
            loadNavbar();
            loadPendingFolders();
            loadPendingLinks();
        });

        async function loadPendingFolders() {
            const { data, error } = await withRetry(() =>
                supabaseClient
                    .from("links")
                    .select("semester, subject, category, id")
                    .eq("status", "pending")
            );

            const foldersDiv = document.getElementById("pending-folders");
            foldersDiv.innerHTML = "";

            if (error) {
                foldersDiv.innerHTML = `<p class="empty-message">⚠️ ${friendlyErrorMessage(error)} <a href="#" id="retry-pending-folders">Retry</a></p>`;
                document.getElementById("retry-pending-folders").onclick = function (e) {
                    e.preventDefault();
                    loadPendingFolders();
                };
                return;
            }

            if (!data || data.length === 0) {
                foldersDiv.innerHTML = `<p class="empty-message">No pending requests!</p>`;
                return;
            }

            const folderGroups = {};
            data.forEach(link => {
                const key = `${link.semester}-${link.subject}-${link.category}`;
                if (!folderGroups[key]) {
                    folderGroups[key] = [];
                }
                folderGroups[key].push(link);
            });

            Object.keys(folderGroups).forEach(key => {
                const count = folderGroups[key].length;
                const [sem, subj, cat] = key.split("-");
                
                const card = document.createElement("div");
                card.className = "pending-card";
                card.innerHTML = `
                    <strong>Semester ${sem} → ${subj}</strong><br>
                    Category: ${cat}<br>
                    <span class="pending-count">🔴 ${count} pending</span>
                `;
                foldersDiv.appendChild(card);
            });
        }

        async function loadPendingLinks() {
            const { data, error } = await withRetry(() =>
                supabaseClient
                    .from("links")
                    .select("*")
                    .eq("status", "pending")
                    .order("created_at", { ascending: false })
            );

            const list = document.getElementById("links-list");

            if (error) {
                list.innerHTML = `<p>⚠️ ${friendlyErrorMessage(error)} <a href="#" id="retry-pending-links">Retry</a></p>`;
                document.getElementById("retry-pending-links").onclick = function (e) {
                    e.preventDefault();
                    loadPendingLinks();
                };
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = "<p>No pending links.</p>";
                return;
            }

            list.innerHTML = "";
            data.forEach(link => {
                const div = document.createElement("div");
                div.className = "note-item";
                div.style.flexDirection = "column";
                div.style.alignItems = "flex-start";
                div.innerHTML = `
                    <div style="width:100%; margin-bottom:10px;">
                        <p style="margin:0; font-weight:bold;">${link.module_name}</p>
                        <p style="margin:5px 0; font-size:14px;">Semester ${link.semester} → ${link.subject} → ${link.category}</p>
                        <p style="margin:5px 0; font-size:14px;">Uploaded by: ${link.uploaded_by}</p>
                    </div>
                    <div style="display:flex; gap:10px; width:100%;">
                        <a href="${link.drive_link}" target="_blank" style="flex:1; display:block; text-align:center; background:#3498db; color:white; padding:8px; border-radius:4px; text-decoration:none;">👁 Preview</a>
                        <button onclick="approve('${link.id}')" style="flex:1; background:#27ae60; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">✅ Approve</button>
                        <button onclick="reject('${link.id}')" style="flex:1; background:#e74c3c; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">❌ Reject</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function approve(id) {
            const { error } = await withRetry(() =>
                supabaseClient.from("links").update({ status: "approved" }).eq("id", id)
            );
            if (error) {
                alert("Error approving link: " + friendlyErrorMessage(error));
                return;
            }
            alert("Link approved!");
            loadPendingFolders();
            loadPendingLinks();
        }

        async function reject(id) {
            const { error } = await withRetry(() =>
                supabaseClient.from("links").delete().eq("id", id)
            );
            if (error) {
                alert("Error rejecting link: " + friendlyErrorMessage(error));
                return;
            }
            alert("Link rejected!");
            loadPendingFolders();
            loadPendingLinks();
        }
    </script>
</body>
</html>

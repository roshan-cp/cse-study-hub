<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1>Login</h1>
        <div class="auth-form">
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <button onclick="login()" id="login-btn">Login</button>
            <p id="loading-msg" style="color:blue; display:none;">⏳ Logging in...</p>
            <p id="error-msg" style="color:red;"></p>
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "roshancp.in@gmail.com";

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");
            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                document.getElementById("error-msg").textContent = "Please fill all fields!";
                return;
            }

            document.getElementById("login-btn").disabled = true;
            document.getElementById("loading-msg").style.display = "block";
            document.getElementById("error-msg").textContent = "";

            const { error } = await supabaseClient.auth.signInWithPassword({
                email, password
            });

            if (error) {
                document.getElementById("error-msg").textContent = error.message;
                document.getElementById("login-btn").disabled = false;
                document.getElementById("loading-msg").style.display = "none";
                return;
            }

            setTimeout(() => {
                window.location.href = "../index.html";
            }, 500);
        }

        loadNavbar();
    </script>
</body>
</html>

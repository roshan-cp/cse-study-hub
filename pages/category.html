<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1 id="category-title">Loading...</h1>
        <div id="folder-info"></div>
        <div id="add-link-section"></div>
        <div id="links-list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = "roshancp.in@gmail.com";
        const params = new URLSearchParams(window.location.search);
        const semester = params.get("semester");
        const subject = params.get("subject");
        const category = params.get("category");
        const folderName = params.get("folderName");
        const isDefault = params.get("isDefault") === "true";
        const moduleParam = params.get("module"); // e.g. "module_1"

        const categoryNames = {
            notes: "Notes",
            syllabus: "Syllabus",
            pyq: "PYQ",
            textbook: "Textbook",
            series_test: "Series Test",
            manual: "Manual",
            experiments: "Experiments",
            experiment_answer_key: "Experiment Answer Key",
            questions: "Questions"
        };

        const moduleLabels = {
            module_1: "Module 1",
            module_2: "Module 2",
            module_3: "Module 3",
            module_4: "Module 4"
        };

        // Set page title
        if (moduleParam && moduleLabels[moduleParam]) {
            document.getElementById("category-title").textContent =
                `📁 ${moduleLabels[moduleParam]} — ${isDefault ? categoryNames[category] : folderName}`;
        } else {
            document.getElementById("category-title").textContent =
                isDefault ? `📁 ${categoryNames[category]}` : `📁 ${folderName}`;
        }

        async function loadNavbar() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data.session?.user;
            const navbar = document.getElementById("navbar");

            if (user) {
                navbar.innerHTML = `
                    <div class="nav-left">
                        <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                        <span class="user-name">Hi, ${user.email.split("@")[0]}</span>
                    </div>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            } else {
                navbar.innerHTML = `
                    <a href="../index.html" class="nav-brand">CSE Study Hub</a>
                    <a href="login.html" class="nav-login">Login</a>
                `;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        async function loadFolderInfo() {
            if (isDefault) return;

            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session?.user;
            const isAdmin = user?.email === ADMIN_EMAIL;

            const { data: folder, error } = await withRetry(() =>
                supabaseClient
                    .from("folders")
                    .select("*")
                    .eq("id", category)
                    .single()
            );

            if (error || !folder) return;

            const folderInfo = document.getElementById("folder-info");
            const canDeleteFolder = isAdmin || (user?.email === folder.created_by);

            folderInfo.innerHTML = `
                <div style="background:#f0f0f0; padding:15px; border-radius:8px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <p style="margin:0;">Created by: <strong>${folder.created_by}</strong></p>
                        <p style="margin:5px 0 0 0; font-size:12px; color:#666;">Folder: ${folder.folder_name}</p>
                    </div>
                    ${canDeleteFolder ? `<button onclick="deleteFolder('${folder.id}')" style="background:#e74c3c; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer;">🗑️ Delete Folder</button>` : ""}
                </div>
            `;
        }

        // ─── MODULE SUB-FOLDER VIEW (Notes without a module selected) ────────
        function renderModuleSubFolders() {
            const linksList = document.getElementById("links-list");
            linksList.innerHTML = "";

            // Back navigation not needed here — we're at the top level of Notes

            const grid = document.createElement("div");
            grid.className = "subject-grid";

            const baseUrl = `category.html?semester=${semester}&subject=${subject}&category=${category}&isDefault=${isDefault}&folderName=${encodeURIComponent(folderName || "")}`;

            [1, 2, 3, 4].forEach(num => {
                const a = document.createElement("a");
                a.href = `${baseUrl}&module=module_${num}`;
                a.className = "card module-card";
                a.textContent = `📂 Module ${num}`;
                grid.appendChild(a);
            });

            linksList.appendChild(grid);
        }

        // ─── LINKS VIEW ───────────────────────────────────────────────────────
        async function loadLinks() {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const user = sessionData.session?.user;
            const isAdmin = user?.email === ADMIN_EMAIL;

            // Add Link button
            const addLinkSection = document.getElementById("add-link-section");
            addLinkSection.innerHTML = "";

            const addBtn = document.createElement("button");
            addBtn.className = "add-link-btn";
            addBtn.textContent = "➕ Add Link";
            addBtn.onclick = function () {
                if (!user) { window.location.href = "login.html"; return; }
                addLink(user.email);
            };
            addLinkSection.appendChild(addBtn);

            // ── If Notes category and no module selected → show module cards ──
            if (category === "notes" && isDefault && !moduleParam) {
                renderModuleSubFolders();
                return;
            }

            // ── Otherwise, load files ─────────────────────────────────────────
            const linksList = document.getElementById("links-list");

            // Back button for module view
            if (moduleParam) {
                const backUrl = `category.html?semester=${semester}&subject=${subject}&category=${category}&isDefault=${isDefault}&folderName=${encodeURIComponent(folderName || "")}`;
                const backBtn = document.createElement("a");
                backBtn.href = backUrl;
                backBtn.className = "back-btn";
                backBtn.textContent = "← Back to Modules";
                linksList.innerHTML = "";
                linksList.appendChild(backBtn);
            } else {
                linksList.innerHTML = "";
            }

            const loadingMsg = document.createElement("p");
            loadingMsg.style.cssText = "color: #3498db; text-align:center;";
            loadingMsg.textContent = "⏳ Loading content...";
            linksList.appendChild(loadingMsg);

            // Build query
            let query = supabaseClient
                .from("links")
                .select("*")
                .eq("semester", semester)
                .eq("subject", subject)
                .eq("category", category)
                .eq("status", "approved");

            if (moduleParam) {
                query = query.eq("sub_category", moduleParam);
            }

            const { data, error } = await withRetry(() => query);

            loadingMsg.remove();

            if (error) {
                linksList.insertAdjacentHTML("beforeend", `<p class="empty-message">⚠️ ${friendlyErrorMessage(error)} <a href="#" id="retry-links">Retry</a></p>`);
                document.getElementById("retry-links").onclick = function (e) {
                    e.preventDefault(); loadLinks();
                };
                return;
            }

            if (!data || data.length === 0) {
                linksList.insertAdjacentHTML("beforeend", `<p class="empty-message">No content available yet.</p>`);
                return;
            }

            // Sort numerically first, then alphabetically
            data.sort((a, b) => {
                const aMatch = a.module_name.match(/\d+/);
                const bMatch = b.module_name.match(/\d+/);
                if (aMatch && bMatch) return parseInt(aMatch[0]) - parseInt(bMatch[0]);
                return a.module_name.localeCompare(b.module_name);
            });

            data.forEach(link => {
                const div = document.createElement("div");
                div.className = "note-item";
                const canDelete = isAdmin || (user?.email === link.uploaded_by);

                div.innerHTML = `
                    <a href="${link.drive_link}" target="_blank" style="flex:1; display:block;">📄 ${link.module_name}</a>
                    <div class="note-actions">
                        ${isAdmin ? `<button class="rename-btn" onclick="renameLink('${link.id}', this)" title="Rename">✏️</button>` : ""}
                        ${canDelete && user ? `<button class="delete-btn" onclick="deleteLink('${link.id}')">🗑️</button>` : ""}
                    </div>
                `;
                linksList.appendChild(div);
            });
        }

        // ─── RENAME (admin only) ──────────────────────────────────────────────
        async function renameLink(id, btn) {
            const noteItem = btn.closest(".note-item");
            const anchor = noteItem.querySelector("a");
            const currentName = anchor.textContent.replace(/^📄\s*/, "").trim();

            const newName = prompt("Enter new file name:", currentName);
            if (!newName || newName.trim() === "" || newName.trim() === currentName) return;

            btn.disabled = true;
            btn.textContent = "⏳";

            const { error } = await withRetry(() =>
                supabaseClient
                    .from("links")
                    .update({ module_name: newName.trim() })
                    .eq("id", id)
            );

            if (error) {
                alert("Error renaming: " + friendlyErrorMessage(error));
                btn.disabled = false;
                btn.textContent = "✏️";
                return;
            }

            anchor.textContent = `📄 ${newName.trim()}`;
            btn.disabled = false;
            btn.textContent = "✏️";
        }

        async function addLink(userEmail) {
            const moduleName = prompt("Link title (e.g. Module 1 - COA Notes):");
            if (!moduleName || moduleName.trim() === "") return;

            const driveLink = prompt("Paste the Google Drive / link URL:");
            if (!driveLink || driveLink.trim() === "") return;

            // Auto-detect sub_category from title if in notes
            let subCategory = null;
            if (category === "notes") {
                const n = moduleName.toLowerCase();
                if (/module\s*1/.test(n)) subCategory = "module_1";
                else if (/module\s*2/.test(n)) subCategory = "module_2";
                else if (/module\s*3/.test(n)) subCategory = "module_3";
                else if (/module\s*4/.test(n)) subCategory = "module_4";
            }

            const { error } = await withRetry(() =>
                supabaseClient
                    .from("links")
                    .insert({
                        module_name: moduleName.trim(),
                        drive_link: driveLink.trim(),
                        semester: semester,
                        subject: subject,
                        category: category,
                        sub_category: subCategory,
                        uploaded_by: userEmail,
                        status: "pending"
                    })
            );

            if (error) {
                alert("Error submitting link: " + friendlyErrorMessage(error));
                return;
            }

            alert("Link submitted! It will appear after admin approval.");
            loadLinks();
        }

        async function deleteLink(id) {
            if (!confirm("Delete this link?")) return;
            const { error } = await withRetry(() =>
                supabaseClient.from("links").delete().eq("id", id)
            );
            if (error) { alert("Error deleting link: " + friendlyErrorMessage(error)); return; }
            loadLinks();
        }

        async function deleteFolder(id) {
            if (!confirm("Delete this folder and all its links?")) return;
            const { error } = await withRetry(() =>
                supabaseClient.from("folders").delete().eq("id", id)
            );
            if (error) { alert("Error deleting folder: " + friendlyErrorMessage(error)); return; }
            await withRetry(() =>
                supabaseClient.from("links").delete().eq("category", id)
            );
            window.location.href = `subject.html?semester=${semester}&subject=${subject}&type=theory`;
        }

        loadNavbar();
        loadFolderInfo();
        loadLinks();
    </script>
</body>
</html>
